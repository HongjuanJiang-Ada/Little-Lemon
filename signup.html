<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Little Lemon</title>

        <!--Include css files here-->
        <link rel="stylesheet" href="css/styles.css">
    </head>
    <body>
        <header>
            <img src="img/logo.png">
        </header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="location.html">Location</a></li>
                <li><a href="booking.html">Booking</a></li>
            </ul>
        </nav>
        <main>
            <h1>Sign Up</h1>
            <form>
                <div>
                    <label for="user_first_name">First Name</label><br>
                    <input type="text" id="user_first_name" name="user_first_name" required>
                </div>
                <div>
                    <label for="user_last_name">Last Name</label><br>
                    <input type="text" id="user_last_name" name="user_last_name" required>
                </div>
                <div>
                    <label for="user_email">Email</label><br>
                    <input type="email" id="user_email" name="user_email" required>
                </div>
                <div>
                    <label for="user_passward">Password</label><br>
                    <input type="password" id="user_passward" name="user_passward" required minlength="8">
                </div>
                <div>
                    <label for="user_confirm_passward">Confirm Password</label><br>
                    <input type="password" id="user_confirm_passward" name="user_confirm_passward" required><br><br>
                </div>
                <div>
                    <button type="submit">Sign Up</button>
                </div>
            </form>
        </main>
        <footer>
            <p>Copyright Little Lemon</p>
        </footer>
    </body>
</html>
