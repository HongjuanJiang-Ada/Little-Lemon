<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Little Lemon</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <meta property="og:title" content="Our Menu">
        <meta property="og:type" content="website">
        <meta property="og:image" content="logo.jpg">
        <meta property="og:url" content="https://littlelemon">
        <meta property="og:description" content="Litttle Lemon is a family-owned Mediterranean restaurant, focused on traditional recipes with a modern twist.">
        <meta property="og:locale" content="en_US">
        <meta property="og:site_name" content="Little Lemon">

        <!--Include css files here-->
        <link rel="stylesheet" href="css/styles.css">
    </head>
    <body>
         <!--add the website name or logo here-->
        <header>
            <img src="img/logo.png">
        </header>
        <nav>
            <!--add website navigation here-->
            <ul>
                <li><a href="location.html">Location</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="booking.html">Booking</a></li>
                <li><a href="signup.html">Sign Up</a></li>
            </ul>
        </nav>
        <main>
            <!--add main content here-->
            <div class="container">
            <div class="row">
                <div class="col-12 col-lg-6">
                    <h1>Our Menu</h1>
                    <div class="row">
                        <div class="col-12 col-lg-6">
                            <div class="card">
                                <img src="img/calamari.jpg" class="card-imd-top"/>
                                <div class="card-body">
                                    <h2 class="card-title">Calamari <span class="badge bg-primary">New</span></h2>
                                    <p class="card-text">Squid, Buttermilk</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-lg-6">
                            <div class="card">
                                <img src="img/falafel.jpg" class="card-img-top">
                                <div class="card-body">
                                    <h2 class="card-title">Falafel</h2>
                                    <p class="card-text">Chickpea, herbs and spices.</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-lg-6">
                            <div class="card">
                                <img src="img/pasta.jpg" class="card-img-top">
                                <div class="card-body">
                                    <h2 class="card-title">Pasta Salad</h2>
                                    <p class="card-text">Lettuce, vegetables and mozzarella.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-lg-6">
                    <h2>Prices</h2>
                    <table class="table">
                        <tr>
                            <td>Calamari</td>
                            <td>$12.00</td>
                        </tr>
                        <tr>
                            <td>Falafel</td>
                            <td>$10.00</td>
                        </tr>
                        <tr>
                            <td>Pasta</td>
                            <td>$12.00</td>
                        </tr>
                    </table>
                    <div class="alert alert-info" role="alert">
                        Try our new Calamari!
                    </div>
                </div>
            </div>
        </div>
        </main>
        <footer>
            <!--add copyright notices and other footer content here -->
            <p>Copyright Little Lemon</p>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
        <!--Include javascript file here-->
        <script src="js/script.js"></script>
